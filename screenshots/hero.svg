<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 184" width="640" height="368" role="img" aria-label="Click a word in Google Meet captions to see its English meaning">
  <rect x="0" y="0" width="320" height="184" rx="16" fill="#eef2ff" />
  <circle cx="284" cy="32" r="42" fill="#e0e7ff" />
  <circle cx="40" cy="156" r="30" fill="#e0e7ff" />

  <!-- vocabulary book (left) -->
  <g>
    <rect x="28" y="40" width="58" height="44" rx="6" fill="#ffffff" stroke="#dfe3f3" />
    <rect x="28" y="40" width="29" height="44" rx="6" fill="#f5f6ff" stroke="#dfe3f3" />
    <line x1="57" y1="41" x2="57" y2="83" stroke="#dfe3f3" />
    <rect x="35" y="51" width="15" height="4" rx="2" fill="#c7cbd6" />
    <rect x="35" y="60" width="15" height="4" rx="2" fill="#d7dae3" />
    <rect x="64" y="51" width="15" height="4" rx="2" fill="#c7cbd6" />
    <rect x="64" y="60" width="15" height="4" rx="2" fill="#d7dae3" />
  </g>

  <!-- definition card (floating, top-right) -->
  <g>
    <rect x="150" y="22" width="142" height="80" rx="12" fill="#ffffff" stroke="#e2e5f0" />
    <rect x="164" y="37" width="60" height="11" rx="5.5" fill="#4f46e5" />
    <circle cx="272" cy="43" r="11" fill="#eef2ff" />
    <path d="M268 43h3l4-3v6l-4-3z" fill="#4f46e5" />
    <rect x="164" y="60" width="112" height="7" rx="3.5" fill="#c7cbd6" />
    <rect x="164" y="73" width="98" height="7" rx="3.5" fill="#d7dae3" />
    <rect x="164" y="86" width="74" height="7" rx="3.5" fill="#d7dae3" />
  </g>

  <!-- connector from word up to the card -->
  <path d="M172 130 C158 118 158 110 180 104" stroke="#6366f1" stroke-width="2" stroke-dasharray="3 4" fill="none" />

  <!-- Google Meet caption bar (bottom) -->
  <rect x="36" y="124" width="248" height="42" rx="10" fill="#1f1f24" />
  <circle cx="55" cy="145" r="8" fill="#fdd663" />
  <rect x="70" y="136" width="40" height="7" rx="3.5" fill="#9aa0a6" />
  <rect x="70" y="148" width="58" height="7" rx="3.5" fill="#6b7280" />
  <rect x="138" y="134" width="54" height="22" rx="6" fill="#6366f1" />
  <rect x="147" y="142" width="36" height="6" rx="3" fill="#ffffff" />
  <rect x="200" y="136" width="32" height="7" rx="3.5" fill="#6b7280" />
  <rect x="200" y="148" width="50" height="7" rx="3.5" fill="#6b7280" />

  <!-- mouse cursor on the highlighted word -->
  <path transform="translate(162 150)" d="M0 0 L0 17 L4.5 12.8 L7.6 19 L10 17.8 L6.9 11.6 L12 11.6 Z" fill="#1f2330" stroke="#ffffff" stroke-width="1.3" stroke-linejoin="round" />
</svg>
